###############################################################################
definitions:
  CreateReqObject:
    type: "object"
    properties:
      profile:
          type: "string"
          default: "PFnubeAFCiudadano"
          description: "Certificate profile"
      scratchcard:
          type: "string"
          default: "11111111"
          description: "Available and unused serial number from the file scratchcards.txt"
      secure_element:
          type: "string"
          default: "2"
          description: "Can be 0, 1 or 2 which stands respectively to Software, Smartcard and Cloud."
      registration_authority:
          type: "string"
          default: "68"
          description: "The unique identifier (PK) of the RA (it's assigned when is created)."
      country_name:
          type: "string"
          default: "ES"
          description: "The country where the RA is registered."
      serial_number:
          type: "string"
          default: "TSTAPI74S23C129Y"
          description: "The country where the RA is registered."
      id_document_country:
          type: "string"
          default: "IT"
      id_document_type:
          type: "string"
          default: "TIN"
      given_name:
          type: "string"
          default: "RAO"
      surname_1:
          type: "string"
          default: "API"
      birth_date:
          type: "string"
          default: "16/10/1965"
      email:
          type: "string"
          default: "email@bit4id.com"
      mobile_phone_number:
          type: "string"
          default: "391234567890"
      paperless_mode:
          type: "string"
          default: "1"
###########
  UpdateReqObject:
    type: "object"

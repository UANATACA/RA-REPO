  /api/v1/requests/{id}/validate:
    get: 
      summary: VALIDATE REQUEST
      tags:
        - REQUESTS
      description: Validate the request fields.
      produces:
        - text/plain 
      parameters:
        - in: path
          name: id
          type: string
          description: The unique identifier of the Request
          required: true
      responses:
        200:
          description: Successful Response
          schema:
            type: object
            description: A JSON object with the request missing parameters (if any)
          examples:
            text/plain:
                [
                    [
                        "serial_number",
                        "missing"
                    ],
                    [
                        "mobile_phone_number",
                        "missing"
                    ]
                ]
        400:
          description: Invalid request id
          schema:
            type: object
            properties:
              code:
                type: string
                description: The response status code
              id:
                type: string
                description: The response status id
              error:
                type: string
                description: The response status message                
          examples:
            application/json:
                {
                    "code": "412",
                    "id": "e443f8e716ee4cfa",
                    "error": ""
                }
        412:
          description: Already approved request id
          schema:
            type: object
            properties:
              code:
                type: string
                description: The response status code
              id:
                type: string
                description: The response status id
              error:
                type: string
                description: The response status message                
          examples:
            application/json:
                {
                    "code": "412",
                    "id": "e443f8e716ee4cfa",
                    "error": "Invalid request status"
                }
#############
  /api/v1/requests/{id}/preauthlink:
    get: 
        summary: GET PRE-AUTH LINK
        tags:
          - REQUESTS
        description: Create a new pre-authenticated link for the request.
        produces:
          - application/json
        parameters:
          - in: path
            name: id
            type: string
            description: The unique identifier of the Request
            required: true
        responses:
          200:
            description: Successful Response
            schema:
              type: object
              properties:
                preauthenticatedlink:
                  type: string
                  description: The pre-authentication link associated to the approved request 
            examples:
              application/json:
                  {
                      "preauthenticatedlink": "https://cms.access.bit4id.org:13035/lcmpl/enrollment/auth/8edddd76680a4ecc978bb95b4fb39029"
                  }
          403:
            description: Permission denied
            schema:
              type: object
              properties:
                detail:
                  type: string
                  description: The response status code              
            examples:
              application/json:
                  {
                      "detail": "You do not have permission to perform this action."
                  }
#############
  /api/v1/requests/{id}/pl_upload_document:
    get: 
      summary: (PAPERLESS) UPLOAD DOCUMENT
      tags:
        - REQUESTS
      description: Upload the required documentation for certificate issuance.
      produces:
        - application/json
      consumes:
        - multipart/form-data
      parameters:
        - in: path
          name: id
          type: string
          description: The unique identifier of the Request
          required: true
        - in: formData
          name: document
          description: The file to be uploaded
          required: true
          type: string
        - in: formData
          name: type
          enum: [document_front, document_rear, document_owner]
          description: The type of the document to be uploaded
          required: true
          type: string
      responses:
        200:
          description: Successful Response
          schema:
            type: object
            properties:
              pk:
                type: number
                description: The document database id
              type: 
                type: number
                description: The uploaded document type
          examples:
            application/json:
                {
                    "pk": 48312,
                    "type": "document_front"
                }
        404:
          description: Invalid request id
          schema:
            type: object
            properties:
              code:
                type: string
                description: The response status code
              id:
                type: string
                description: The response status id
              error:
                type: string
                description: The response status message                
          examples:
            application/json:
                {
                    "code": "400",
                    "id": "c6972c3efdc6db8e",
                    "error": "No Request matches the given query."
                } 
        412:
          description: Missing document
          schema:
            type: object
            properties:
              code:
                type: string

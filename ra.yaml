  /api/v1/requests/{id}/validate:
    get: 
      summary: VALIDATE REQUEST
      tags:
        - REQUESTS
      description: Validate the request fields.
      produces:
        - text/plain 
      parameters:
        - in: path
          name: id
          type: string
          description: The unique identifier of the Request
          required: true
      responses:
        200:
          description: Successful Response
          examples:
            text/plain:
                [
                    [
                        "serial_number",
                        "missing"
                    ],
                    [
                        "mobile_phone_number",
                        "missing"
                    ]
                ]

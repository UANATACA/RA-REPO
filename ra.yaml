  /api/v1/requests/{id}/cancel:
    delete: 
      summary: CANCEL REQUEST
      tags:
        - REQUESTS
      description: Change the request status to CANCELLED.
      produces:
        - application/json 
      parameters:
        - in: path
          name: id
          type: string
          description: The unique identifier of the Request
          required: true
      responses:
        200:
          description: Successful Response
          schema:
            type: object
            properties:
              status:
                type: string
                description: The successful cancellation status message
          examples:
            application/pdf:
                {
                    "status": "Request cancelled"
                }
        404:
          description: Invalid request id
          schema:
            type: object
            properties:
              code:
                type: string
                description: The response status code
              id:
                type: string
                description: The response status id
              error:
                type: string
                description: The response status message                
          examples:
            application/json:
                {
                    "code": "400",
                    "id": "cbdd2e84c0e7f107",
                    "error": "No Request matches the given query."
                }
        412:
          description: Already approved/cancelled request id
          schema:
            type: object
            properties:
              code:
                type: string
                description: The response status code
              id:
                type: string
                description: The response status id
              error:
                type: string
                description: The response status message                
          examples:
            application/json:
                {
                    "code": "412",
                    "id": "478492eec17596d3",
                    "error": "Invalid request status"
                }

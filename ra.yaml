  /api/v1/requests/{id}/pl_upload_document:
    get: 
      summary: (PAPERLESS) UPLOAD DOCUMENT
      tags:
        - REQUESTS
      description: Upload the required documentation for certificate issuance.
      produces:
        - application/json
      consumes:
        - multipart/form-data
      parameters:
        - in: path
          name: id
          type: string
          description: The unique identifier of the Request
          required: true
        - in: formData
          name: document
          description: The file to be uploaded
          required: true
          type: string
        - in: formData
          name: type
          enum: [document_front, document_rear, document_owner]
          description: The type of the document to be uploaded
          required: true
          type: string
      responses:
        200:
          description: Successful Response
          examples:
            application/json:
                {
                    "pk": 48312,
                    "type": "document_front"
                }              
#############
  /api/v1/requests/{id}/pl_delete_document:
    get: 
      summary: (PAPERLESS) DELETE DOCUMENT
      tags:
        - REQUESTS
      description: Delete an identification document previously uploaded.
      produces:
        - application/json
      consumes:
        - multipart/form-data
      parameters:
        - in: path
          name: id
          type: string
          description: The unique identifier of the Request
          required: true
        - in: formData
          name: docpk
          description: The database primary key of the document to be deleted
          required: true
          type: string
      responses:
          200:
            description: Successful Response
            examples:
              application/json:
                  {
                      "status": "Document deleted successfully"
                  }              

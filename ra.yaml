  /api/v1/requests/{id}/generate_document:
    post: 
      summary: GENERATE DOCUMENT
      tags:
        - REQUESTS
      description: Retrieve the documents associated to the Request
      produces:
        - application/json 
      parameters:
        - in: path
          name: id
          type: string
          description: The unique identifier of the Request
          required: true
        - in: "body"
          name: "body"
          schema:
            $ref: "#/definitions/GenDocObject"
      responses:
        200:
          description: Successful Response
          examples:
            application/pdf:

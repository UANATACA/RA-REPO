###### definitions ######
###############################################################################
definitions:
  CreateReqObject:
    type: "object"
    properties:
      profile:
          type: "string"
          description: "Certificate profile"
      scratchcard:
          type: "string"
          description: "Available and unused serial number from the file scratchcards.txt"
      secure_element:
          type: "string"
          description: "Can be 0, 1 or 2 which stands respectively to Software, Smartcard and Cloud."
      registration_authority:
          type: "string"
          description: "The unique identifier (PK) of the RA (it's assigned when is created)."
      country_name:
          type: "string"
          description: "The country where the RA is registered."
      serial_number:
          type: "string"
          description: "The country where the RA is registered."
      id_document_country:
          type: "string"
      id_document_type:
          type: "string"
      given_name:
          type: "string"
      surname_1:
          type: "string"
      surname_2:
          type: "string"
      email:
          type: "string"
      mobile_phone_number:
          type: "string"
      paperless_mode:
          type: "number"
###########
  UpdateReqObject:
    type: "object"
    properties:
      profile:
          type: "string"
          description: "Certificate profile"
      scratchcard:
          type: "string"
          description: "Available and unused serial number from the file scratchcards.txt"
      secure_element:
          type: "string"
          description: "Can be 0, 1 or 2 which stands respectively to Software, Smartcard and Cloud."
      registration_authority:
          type: "string"
          description: "The unique identifier (PK) of the RA (it's assigned when is created)."
      country_name:
          type: "string"
          description: "The country where the RA is registered."
      serial_number:
          type: "string"
          description: "The country where the RA is registered."
      id_document_country:
          type: "string"
      id_document_type:
          type: "string"
      given_name:
          type: "string"
      surname_1:
          type: "string"
      email:
          type: "string"
      mobile_phone_number:
          type: "string"
###########
  TBSObject:
    type: "object"
    properties:
      rao:
          type: "string"
          description: "The unique identifier of the RAO that will sign and approve the request"
      type:
          type: "string"
          description: "The type of the receipt to generate"
###########
  ApproveReqObject:
    type: "object"
    properties:
      rao:
          type: "string"
          description: "The unique identifier of the RAO that will sign and approve the request"
      receipt:
          type: "string"
          description: "The signed receipt as a Base64 formatted string"
###########
  CloudEnrObject:
    type: "object"
    properties:
      scratchcard:
          type: "string"
          description: "The scratchcard number of the request to be enrolled"
      erc:
          type: "string"
          description: "The enrollment code associated to the scratchcard"
      pin:
          type: "string"
          description: "A new PIN code to assign. Must contain at least 2 letters, 2 numbers and must be at least 8 characters long"
      puk:
          type: "string"
          description: "A new puk to assign. Must contain at least 2 letters, 2 numbers and must be at least 8 characters long"
###########
  SoftEnrObject:  
    type: "object"
    properties:
      scratchcard:
          type: "string"
          description: "The scratchcard number of the request to be enrolled"
      enrollment_code:
          type: "string"
          description: "The enrollment code associated to the scratchcard"

###########
  PlApproveReqObject:
    type: "object"
    properties:
      username:
          type: "string"
          description: "The RAO's username"
      password:
          type: "string"
          description: "The RAO's password"
      pin:
          type: "string"
          description: "The RAO's PIN"
      rao_id:
          type: "string"
          description: "The RAO's id"
      lang:
          type: "string"
          description: "The contract language"
###########
  PlCloudEnrObject:
    type: "object"
    properties:
      secret:
          type: "string"
          description: "The OTP code sent to the client via SMS"
      pin:
          type: "string"
          description: "The PIN code created by the client (must contain at least 2 letters, 2 numbers and must be at least 8 characters long)"
###########
  PlSoftEnrObject:
    type: "object"
    properties:
      secret:
          type: "string"
          description: "The OTP code sent to the client via SMS"
      p12password:
          type: "string"
          description: "The PIN code created by the client (must contain at least 2 letters, 2 numbers and must be at least 8 characters long)"
###########
  GenOTPforQS:
    type: "object"
    properties:
      pin:
          type: "string"
          description: "The PIN code created by the client (must contain at least 2 letters, 2 numbers and must be at least 8 characters long)"
      puk:
          type: "string"
          description: "The PUK code created by the client (must contain at least 2 letters, 2 numbers and must be at least 8 characters long)"          
###########
  CreateScrObject:
    type: "object"
    properties:
      sn:
          type: "string"
          description: "The scratchcard serial number  "
      registration_authority:
          type: "string"
          description: "The registration authority id"
      secret:
          type: "object"
          properties:
              erc:
                  type: "string"
                  description: "Security code used for recovery or revocation purpose"
              enrollment_code:
                  type: "string"
                  description: "Security code requested for different operations (like certificate enrollment)"
              pin:

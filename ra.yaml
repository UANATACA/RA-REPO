  /api/v1/requests/{id}/cloud_enroll:
    post: 
      summary: STANDARD CLOUD ENROLL
      tags:
        - REQUESTS
      description: "**Standard Cloud Mode.** The enrollment consists in the generation of a new digital certificate for a request already created and approved."
      consumes:
        - application/json
      produces:
        - application/json 
      parameters:
        - in: path
          name: id
          type: string
          description: The unique identifier of the Request
          required: true
        - in: "body"
          name: "body"
          schema:
            $ref: "#/definitions/CloudEnrObject"
      responses:
        200:
          description: Successful Response
          examples:
            application/json:
                {
                    [
                        {
                            "data": "MIIHyTCCBbGgAwIBAgIIcO...",
                            "profile": "PFnubeAF",
                            "subject": "CN=RAO COFTenerife API,

    get: 
      summary: LIST REQUESTS
      tags:
        - REQUESTS
      description: Retrieves the list of requests stored.
      produces:
        - application/json 
      responses:
        200:
          description: Successful Response
          examples:
            application/json:
                {
                    "count": 408,
                    "next": "https://api.uanataca.com/api/v1/requests/?page=2&status=ISSUED",
                    "previous": null,
                    "results": [...]
                }

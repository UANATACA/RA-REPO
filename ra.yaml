  /api/v1/requests/{id}/generates_tbs_receipt:
    post: 
      summary: GENERATE A TBS RECEIPT
      tags:
        - REQUESTS
      description: Generates a receipt associated to a request
      consumes:
        - application/json
      produces:
        - application/json 
      parameters:
        - in: path
          name: id
          type: string
          description: The unique identifier of the Request
          required: true
        - in: "body"
          name: "body"
          schema:
            $ref: "#/definitions/TBSObject"
      responses:
        200:
          description: Successful Response
          examples:
            application/json:
                {
                    "rao": "100",
                    "type": "APPROVE"
                }
#############

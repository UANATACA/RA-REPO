  /api/v1/requests/{id}/cancel:
    delete: 
      summary: CANCEL REQUEST
      tags:
        - REQUESTS
      description: Change the request status to CANCELLED.
      produces:
        - application/json 
      parameters:
        - in: path
          name: id
          type: string
          description: The unique identifier of the Request
          required: true
      responses:
        200:
          description: Successful Response
          examples:
            application/pdf:
                {
                    "status": "Request cancelled"
                }

                      -F type=document_front
          - lang: 'Javascript'
            source: |
                    var formdata = new FormData();
                    formdata.append("type", "document_front");
                    formdata.append("document", fileInput.files[0], "sample_folder/img_front.png");

                    var requestOptions = {
                      method: 'POST',
                      headers: myHeaders,

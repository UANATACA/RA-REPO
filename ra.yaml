  /api/v1/requests/{id}:
    get: 
      summary: GET REQUEST
      tags:
        - REQUESTS
      description: Returns the information registered about a Request.
      produces:
        - application/json 
      parameters:
        - in: path
          name: id
          type: string
          description: The unique identifier of the Request
          required: true
      responses:
        200:
          description: Successful Response
          examples:
            application/pdf:
                {
                    "pk": 123,
                    "given_name": "given_name_1",

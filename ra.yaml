  /api/v1/requests/{id}/generates_tbs_receipt:
    post: 
      summary: GENERATE A TBS RECEIPT
      tags:
        - REQUESTS
      description: Generates a receipt associated to a request
      consumes:
        - application/json
      produces:
        - application/json 
      parameters:
        - in: path
          name: id
          type: string
          description: The unique identifier of the Request
          required: true
        - in: "body"
          name: "body"
          schema:
            $ref: "#/definitions/TBSObject"
      responses:
        200:
          description: Successful Response
          schema:
            type: object
            properties:
              serial_number:
                type: string
                description: The receipt serial number
              receipt:
                type: string
                description: The receipt content
          examples:
            application/json:
                {
                    "serial_number": "3ef3696d2939241d",
                    "receipt": "El operador RAO Name RAO Surname1 con número de identificación 12345678P\r\nactuando en calidad de operador autorizado de registro del prestador de servicios\r\nde confianza UANATACA, S.A. con NIF A66721499, (UANATACA en lo sucesivo)\r\n\r\nDECLARA\r\n\r\nQue previa verificación de acuerdo a la Declaración de Prácticas de UANATACA\r\npublicadas en www.uanataca.com, la información detallada a continuación es\r\ncorrecta y será incluida (donde aplicable) en la solicitud de certificados\r\ncualificados:\r\n\r\n- Datos de Identificación de la solicitud de certificados: 36893\r\n- Nombre y Apellidos del Firmante: Name Surname1 Surname2\r\n- DNI/NIE/PASAPORTE del Firmante: 11111111B\r\n- Dirección de correo electrónico del Firmante: mail@domain.com\r\n\r\n\r\n18/03/2021\r\n\r\n\r\n\r\n--------------------------------------------------------------------\r\nFdo. User Admin\r\nOperador autorizado de registro"
                }
        400:
          description: Request id not found
          schema:
            type: object
            properties:
              code:
                type: string
                description: The response status code
              id:
                type: string
                description: The response status id
              error:
                type: string
                description: The response status message    
          examples:
            application/json:
                {
                    "code": "400",
                    "id": "b78952287417c96f",
                    "error": "No Request matches the given query."
                }

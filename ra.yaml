  /api/v1/scratchcards:
    post: 
      summary: CREATE SCRATCHCARD
      tags:
        - SCRATCHCARDS
      description: Create a new scratchcard.
      consumes:
        - application/json
      produces:
        - application/json 
      parameters:
        - in: "body"
          name: "body"
          schema:
            $ref: "#/definitions/CreateScrObject"
      responses:
        200:
          description: Successful Response
          schema:
            type: object
            properties:
              pk:
                type: number
                description: The scratchcard database id
              sn: 
                type: number
                description: The scratchcard serial number
              secrets:
                type: object
                properties:
                    erc:
                      type: string
                    enrollment_code:
                      type: string
                    pin:
                      type: string
                    puk:
                      type: string
              registration_authority:
                type: number
          examples:
            application/json:
                {
                    "pk": 1245,
                    "sn": "110000150",
                    "secrets": "{\"erc\": \"8207878566\", \"enrollment_code\": \"97Q6B,6W\", \"pin\": \"25936657\", \"puk\": \"44024058\"}",
                    "registration_authority": 41
                }
        403:
          description: Permission denied
          schema:
            type: object
            properties:
              detail:
                type: string
                description: The response status message
          examples:
            application/json:
                {
                    "detail": "You do not have permission to perform this action."
                }
#############
    get: 
      summary: LIST SCRATCHCARDS
      tags:
        - SCRATCHCARDS
      description: Gets the list of scratchcards
      responses:
        200:
          description: Successful Response
          schema:
            type: object
            properties:
              count:
                type: string
                description: The number of existing scratchcards
              next:
                type: string
                description: The list next page endpoint
              previous:
                type: string
                description: The list previous page endpoint                
              results:
                type: object
                description: A JSON object with the listed scratchcards information
          examples:
            application/json:
                {
                    "count": 1500,
                    "next": null,
                    "previous": null,
                    "results": [
                        {
                            "pk": 1245,
                            "sn": "110000150",
                            "secrets": "{\"erc\": \"8207878566\", \"enrollment_code\": \"97Q6B,6W\", \"pin\": \"25936657\", \"puk\": \"25936657\"}",
                            "registration_authority": 2
                        },
                        {
                            "pk": 1193,
                            "sn": "100000147",
                            "secrets": "{\"erc\": \"6292998123\", \"enrollment_code\": \"_,463vt:\", \"pin\": \"08695572\", \"puk\": \"52351291\"}",
                            "registration_authority": 2
                        },
                        {
                            "pk": 1192,

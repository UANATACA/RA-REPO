    get: 
      summary: LIST REQUESTS
      tags:
        - Requests
      description: Retrieves the list of requests stored.
      produces:
        - application/json 
      responses:
        200:
          description: Successful Response
          schema:
            type: object
            properties:
              count:
                type: string
                description: The number of existing requests
              next:
                type: string
                description: The list next page endpoint
              previous:
                type: string
                description: The list previous page endpoint                
              results:
                type: object
                description: A JSON object with full information related to each listed request
          examples:
            application/json:
